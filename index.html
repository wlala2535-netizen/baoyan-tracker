<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026保研夏令营 & 预推免信息追踪 · 外国语专业</title>
<style>
:root {
  --bg: #0a0e14; --surface: #131820; --surface2: #181f2a; --border: #1e2a3a;
  --primary: #39bae6; --secondary: #a37acc; --accent: #ff6b6b; --green: #2ecc71;
  --orange: #e67e22; --yellow: #f1c40f; --text: #b3c7d6; --text-muted: #5c6e80;
  --text-bright: #e6edf3; --radius: 10px; --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  --glow: 0 0 20px rgba(57,186,230,0.25); --c985: #a37acc; --c211: #39bae6;
  --c-lang: #2ecc71; --c-other: #5c6e80;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(57,186,230,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(57,186,230,.02) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0}
.container{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:24px 20px 64px}

.header{text-align:center;margin-bottom:28px}
.header h1{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .subtitle{color:var(--text-muted);font-size:.85rem;margin-top:4px}

.toolbar{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:10px;margin-bottom:20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;border:1px solid transparent;transition:var(--transition);font-family:inherit}
.btn-primary{background:linear-gradient(135deg,var(--primary),#1e88e5);color:#fff;box-shadow:0 0 16px rgba(57,186,230,.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 28px rgba(57,186,230,.5)}
.btn-outline{background:transparent;border-color:var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--primary);color:var(--text-bright)}
.btn-sm{padding:5px 12px;font-size:.78rem}
.btn-success{background:rgba(46,204,113,.12);border-color:rgba(46,204,113,.3);color:var(--green)}
.btn-success:hover{background:rgba(46,204,113,.2)}
.btn-warning{background:rgba(230,126,34,.12);border-color:rgba(230,126,34,.3);color:var(--orange)}
.btn-warning:hover{background:rgba(230,126,34,.2)}

.stats-bar{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 20px;text-align:center;min-width:88px}
.stat-card .num{font-size:1.4rem;font-weight:700;color:var(--text-bright)}
.stat-card .lbl{font-size:.72rem;color:var(--text-muted)}
.stat-card.active .num{color:var(--green)}
.stat-card.urgent .num{color:var(--accent)}
.stat-card.track .num{color:var(--primary)}
.stat-card.offer .num{color:var(--yellow)}

.filter-bar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:16px}
.filter-bar select,.filter-bar input{padding:8px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text-bright);font-size:.84rem;font-family:inherit;outline:none}
.filter-bar select:focus,.filter-bar input:focus{border-color:var(--primary)}
.filter-bar input{flex:1;min-width:160px}

.tab-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;justify-content:center}
.tab-btn{padding:7px 16px;border-radius:20px;font-size:.82rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-muted);transition:var(--transition);font-family:inherit}
.tab-btn:hover{border-color:var(--primary);color:var(--text)}
.tab-btn.active{background:rgba(57,186,230,.12);border-color:var(--primary);color:var(--primary);font-weight:600}
.tab-count{display:inline-block;border-radius:10px;padding:1px 7px;font-size:.68rem;margin-left:2px;vertical-align:top;background:rgba(255,107,107,.15);color:var(--accent)}

.last-refresh{font-size:.78rem;color:var(--text-muted);text-align:center;margin-bottom:20px}
.last-refresh span{color:var(--primary);font-weight:600}

.table-wrapper{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow-x:auto;max-height:60vh;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:.82rem;min-width:1100px}
thead{position:sticky;top:0;z-index:2}
th{background:var(--surface2);color:var(--text-bright);font-weight:600;padding:10px 10px;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap;font-size:.78rem}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:rgba(57,186,230,.03)}tr.discovered td{background:rgba(241,196,15,.06)}tr.discovered td:first-child{border-left:3px solid var(--yellow)}
td a{color:var(--primary);text-decoration:none;word-break:break-all}
td a:hover{text-decoration:underline}

.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:600;white-space:nowrap}
.badge-active{background:rgba(46,204,113,.15);color:var(--green)}
.badge-urgent{background:rgba(255,107,107,.12);color:var(--accent)}
.badge-closed{background:rgba(92,110,128,.12);color:var(--text-muted)}
.badge-upcoming{background:rgba(241,196,15,.12);color:var(--yellow)}
.badge-summer{background:rgba(46,204,113,.12);color:var(--green)}
.badge-pre{background:rgba(57,186,230,.12);color:var(--primary)}
.badge-985{background:rgba(163,122,204,.15);color:var(--c985)}
.badge-211{background:rgba(57,186,230,.15);color:var(--c211)}
.badge-lang{background:rgba(46,204,113,.15);color:var(--c-lang)}
.badge-verified{background:rgba(46,204,113,.15);color:var(--green);font-size:.65rem;padding:1px 5px}
.badge-predicted{background:rgba(241,196,15,.12);color:var(--yellow);font-size:.65rem;padding:1px 5px}

.track-btn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);background:transparent;cursor:pointer;font-size:.6rem;font-weight:700;transition:var(--transition);margin:0 2px;color:var(--text-muted);font-family:inherit}
.track-btn:hover{border-color:var(--primary)}
.track-btn.on-applied{background:rgba(46,204,113,.15);border-color:var(--green);color:var(--green)}
.track-btn.on-interview{background:rgba(57,186,230,.15);border-color:var(--primary);color:var(--primary)}
.track-btn.on-offer{background:rgba(241,196,15,.2);border-color:var(--yellow);color:var(--yellow)}

.pagination{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:16px;flex-wrap:wrap}
.pagination button{padding:6px 14px;border-radius:6px;font-size:.8rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;transition:var(--transition)}
.pagination button:hover:not(:disabled){border-color:var(--primary);color:var(--text-bright)}
.pagination button:disabled{opacity:.4;cursor:default}
.pagination .page-info{color:var(--text-muted);font-size:.8rem}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px 28px;max-width:560px;width:90%;max-height:85vh;overflow-y:auto}
.modal h3{color:var(--text-bright);margin-bottom:14px;font-size:1rem}
.modal label{display:block;color:var(--text-muted);font-size:.78rem;margin:8px 0 3px}
.modal input,.modal select,.modal textarea{width:100%;padding:7px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text-bright);font-size:.84rem;font-family:inherit}
.modal textarea{resize:vertical;min-height:45px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}

.report-view{display:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 32px;max-width:900px;margin:0 auto}
.report-view h2{color:var(--text-bright);margin-bottom:6px}
.report-view .report-date{color:var(--primary);font-size:.9rem;margin-bottom:20px}
.report-view .report-section{margin-bottom:20px}
.report-view .report-section h4{color:var(--text-bright);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.report-view .report-item{display:flex;justify-content:space-between;padding:5px 0;font-size:.84rem;border-bottom:1px solid rgba(30,42,58,.5)}
.report-view .report-item .ri-left{flex:1}
.report-view .report-item .ri-right{color:var(--text-muted);white-space:nowrap;margin-left:12px}
.report-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:16px 0}

.footer{text-align:center;margin-top:40px;font-size:.78rem;color:var(--text-muted)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.tab-content{animation:fadeUp .3s ease both}
::selection{background:rgba(57,186,230,.25);color:var(--text-bright)}
.table-wrapper::-webkit-scrollbar{width:5px;height:5px}
.table-wrapper::-webkit-scrollbar-track{background:transparent}
.table-wrapper::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

@media(max-width:768px){
  .header h1{font-size:1.3rem}
  .toolbar{flex-direction:column}
  .stats-bar{gap:6px}
  .stat-card{padding:8px 12px;min-width:60px}
  .stat-card .num{font-size:1.1rem}
  table{font-size:.72rem;min-width:800px}
  th,td{padding:6px 8px}
  .filter-bar{flex-direction:column}
  .filter-bar input{width:100%}
}
@media print{
  body{background:#fff;color:#000}
  .toolbar,.tab-bar,.filter-bar,.pagination,.footer,.btn{display:none}
  .table-wrapper{max-height:none;overflow:visible}
  .report-view{display:block!important}
  .table-wrapper{display:none}
}
</style>
</head>
<body>
<div id="toast" style="display:none;position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:200;background:var(--primary);color:#fff;padding:10px 24px;border-radius:20px;font-size:.85rem;font-weight:600;box-shadow:0 4px 20px rgba(57,186,230,.4);transition:all .3s ease"></div>
<div class="container">
<header class="header">
  <h1>2026 保研夏令营 & 预推免 信息追踪</h1>
  <p class="subtitle">覆盖11大类 · 120+院校 · 外国语专业保研全方向 | 数据更新于 <span id="updateDate">--</span></p>
</header>

<div class="toolbar">
  <button class="btn btn-primary" onclick="generateDailyReport()">🔮 生成今日汇总</button>
  <button class="btn btn-outline" onclick="showTrackingSummary()">📊 追踪统计</button>
  <button class="btn btn-outline" onclick="openAddModal()">➕ 添加信息</button>
  <button class="btn btn-outline" onclick="exportCSV()">📥 导出CSV</button>
  <button class="btn btn-outline btn-sm" onclick="exportJSON()">💾 备份JSON</button>
  <button class="btn btn-outline btn-sm" onclick="document.getElementById('importFile').click()">📂 导入JSON</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
  <button class="btn btn-outline btn-sm" onclick="refreshPage()">🔄 刷新</button>
  <button class="btn btn-outline btn-sm" onclick="resetData()">⚠️ 恢复默认</button>
</div>

<div class="stats-bar" id="statsBar"></div>

<div id="autoCheckBar" style="display:none;background:rgba(241,196,15,.08);border:1px solid rgba(241,196,15,.25);border-radius:var(--radius);padding:14px 20px;margin-bottom:16px;font-size:.84rem">
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;cursor:pointer" onclick="document.getElementById('autoCheckDetail').style.display=document.getElementById('autoCheckDetail').style.display==='none'?'block':'none'">
    <span style="font-size:1.1rem">🤖</span>
    <strong>自动检查报告</strong>：
    <span>上次 <span id="autoCheckTime">--</span></span>
    <span>扫描 <span id="autoCheckTotal">--</span> 所</span>
    <span>📋 相关公告 <span id="autoCheckTotalItems">--</span> 条</span>
    <span style="color:var(--accent);font-weight:700">🆕 新增 <span id="autoCheckFound">--</span> 条</span>
    <span style="font-size:.75rem;color:var(--text-muted)">▸ 点击展开详情</span>
  </div>
  <div id="autoCheckDetail" style="display:none;margin-top:12px;padding-top:10px;border-top:1px solid rgba(241,196,15,.15);max-height:400px;overflow-y:auto"></div>
</div>

<div class="filter-bar">
  <select id="filterCategory" onchange="applyFilters()">
    <option value="all">全部类别</option>
  </select>
  <select id="filterTier" onchange="applyFilters()">
    <option value="all">全部层次</option>
    <option value="985">985</option>
    <option value="211">211</option>
    <option value="language">外语类院校</option>
  </select>
  <select id="filterConfidence" onchange="applyFilters()">
    <option value="all">全部可信度</option>
    <option value="confirmed">已确认</option>
    <option value="predicted">预测</option>
  </select>
  <input type="text" id="searchInput" placeholder="搜索学校、专业、关键词..." oninput="applyFilters()">
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="all" onclick="switchTab('all')">全部</button>
  <button class="tab-btn" data-tab="active" onclick="switchTab('active')">报名中 <span class="tab-count" id="tabActiveCnt">0</span></button>
  <button class="tab-btn" data-tab="urgent" onclick="switchTab('urgent')">即将截止 <span class="tab-count" id="tabUrgentCnt">0</span></button>
  <button class="tab-btn" data-tab="today" onclick="switchTab('today')">今日关注</button>
  <button class="tab-btn" data-tab="applied" onclick="switchTab('applied')">已申请 <span class="tab-count" id="tabAppliedCnt">0</span></button>
  <button class="tab-btn" data-tab="interviewed" onclick="switchTab('interviewed')">已入面 <span class="tab-count" id="tabInterviewedCnt">0</span></button>
  <button class="tab-btn" data-tab="offered" onclick="switchTab('offered')">已录取 <span class="tab-count" id="tabOfferedCnt">0</span></button>
</div>

<p class="last-refresh">最近刷新：<span id="lastRefreshTime">--</span> | 点击"生成今日汇总"获取当日报告</p>

<div class="table-wrapper" id="tableWrapper">
  <table>
    <thead><tr>
      <th>学校</th><th>学院</th><th>专业方向</th><th>类别</th><th>类型</th>
      <th>报名截止</th><th>活动时间</th><th>状态</th><th>可信度</th>
      <th style="width:110px">追踪</th><th>网址</th><th>备注</th>
    </tr></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div class="pagination" id="pagination"></div>

<div class="report-view" id="reportView"></div>

<footer class="footer">
  &copy; 2026 保研信息追踪 · 数据来源各大高校官网，建议核实后使用 · <span id="dataCount">0</span> 条记录
  · <a href="javascript:void(0)" onclick="switchTab('all');document.getElementById('reportView').style.display='none';document.getElementById('tableWrapper').style.display='';document.getElementById('pagination').style.display=''" style="color:var(--primary)">返回表格</a>
</footer>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modalTitle">添加招生信息</h3>
    <label>学校名称 *</label>
    <input type="text" id="mSchool" list="schoolList" placeholder="输入或选择学校">
    <datalist id="schoolList"></datalist>
    <label>学院/机构 *</label>
    <input type="text" id="mCollege" placeholder="如：外国语学院">
    <label>专业方向 *</label>
    <input type="text" id="mMajor" placeholder="如：英语语言文学">
    <label>类别 *</label>
    <select id="mCategory"></select>
    <label>类型 *</label>
    <select id="mType"><option value="夏令营">夏令营</option><option value="预推免">预推免</option><option value="暑期学校">暑期学校</option></select>
    <label>报名截止时间</label>
    <input type="text" id="mDeadline" placeholder="如：2026年6月15日">
    <label>活动/复试时间</label>
    <input type="text" id="mEventDate" placeholder="如：2026年7月11日-12日">
    <label>招生人数</label>
    <input type="text" id="mQuota" placeholder="如：30人">
    <label>状态</label>
    <select id="mStatus"><option value="报名中">报名中</option><option value="即将截止">即将截止</option><option value="已截止">已截止</option><option value="即将发布">即将发布</option><option value="待发布">待发布</option></select>
    <label>网址</label>
    <input type="text" id="mUrl" placeholder="https://...">
    <label>可信度</label>
    <select id="mConfidence"><option value="predicted">预测</option><option value="confirmed">已确认</option></select>
    <label>备注</label>
    <textarea id="mNote" placeholder="其他备注信息..."></textarea>
    <input type="hidden" id="mId" value="">
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveEntry()">保存</button>
    </div>
  </div>
</div>

<!-- Tracking Summary Modal -->
<div class="modal-overlay" id="trackModal">
  <div class="modal" style="max-width:600px">
    <h3>📊 申请追踪汇总</h3>
    <div id="trackSummaryContent"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="document.getElementById('trackModal').classList.remove('show')">关闭</button>
    </div>
  </div>
</div>

// ==================== DATA MANAGEMENT ====================
const STORAGE_KEY = 'baoyan_2026_data_v2';
const SCHEMA_KEY = 'baoyan_2026_schema_v';
const SETTINGS_KEY = 'baoyan_settings';
const SCHEMA_VERSION = 2;
let PAGE_SIZE = parseInt((JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}')).pageSize || 50);

let data = [];
let currentTab = 'all';
let currentPage = 1;
let currentFilters = { category: 'all', tier: 'all', confidence: 'all', search: '' };

function loadData() {
  const stored = localStorage.getItem(STORAGE_KEY);
  const schemaV = parseInt(localStorage.getItem(SCHEMA_KEY) || '0');

  if (stored && schemaV >= SCHEMA_VERSION) {
    try { data = JSON.parse(stored); } catch(e) { data = migrateFromV1(); }
  } else if (stored && schemaV < SCHEMA_VERSION) {
    data = migrateFromV1();
  } else {
    data = [...DEFAULT_DATA];
    localStorage.setItem(SCHEMA_KEY, String(SCHEMA_VERSION));
  }

  if (!stored) {
    data = [...DEFAULT_DATA];
    saveData();
  }
}

function migrateFromV1() {
  const old = localStorage.getItem('baoyan_2026_data');
  if (!old) return [...DEFAULT_DATA];
  try {
    const oldData = JSON.parse(old);
    const migrated = oldData.map(d => ({
      id: d.id || generateId(),
      schoolId: d.schoolId || '',
      school: d.school || '',
      college: d.college || '',
      major: d.major || '',
      category: mapOldCategory(d.category),
      type: d.type || '夏令营',
      deadline: d.deadline || '',
      eventDate: d.eventDate || '',
      quota: d.quota || '若干',
      status: d.status || '待发布',
      url: d.url || '',
      urlVerified: d.urlVerified || false,
      confidence: d.confidence || 'predicted',
      note: d.note || '',
      applied: d.applied || false,
      interviewed: d.interviewed || false,
      offered: d.offered || false,
      appliedAt: d.appliedAt || null,
      interviewedAt: d.interviewedAt || null,
      offeredAt: d.offeredAt || null
    }));
    localStorage.setItem(SCHEMA_KEY, String(SCHEMA_VERSION));
    return migrated;
  } catch(e) { return [...DEFAULT_DATA]; }
}

function mapOldCategory(old) {
  const map = { japanese: 'foreign_language', areastudies: 'area_studies', law: 'law_ilm' };
  return map[old] || 'foreign_language';
}

function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); localStorage.setItem(SCHEMA_KEY, String(SCHEMA_VERSION)); }

// ==================== FILTERING & RENDERING ====================
function getFilteredData() {
  let filtered = [...data];

  if (currentTab === 'active') filtered = filtered.filter(d => (d.status || '').includes('报名中'));
  else if (currentTab === 'urgent') filtered = filtered.filter(d => (d.status || '').includes('即将截止'));
  else if (currentTab === 'today') filtered = filtered.filter(d => {
    const s = d.status || '';
    return s.includes('报名中') || s.includes('即将截止') || s.includes('即将发布');
  });
  else if (currentTab === 'applied') filtered = filtered.filter(d => d.applied);
  else if (currentTab === 'interviewed') filtered = filtered.filter(d => d.interviewed);
  else if (currentTab === 'offered') filtered = filtered.filter(d => d.offered);

  if (currentFilters.category !== 'all') filtered = filtered.filter(d => d.category === currentFilters.category);
  if (currentFilters.confidence !== 'all') filtered = filtered.filter(d => d.confidence === currentFilters.confidence);

  if (currentFilters.tier !== 'all') {
    filtered = filtered.filter(d => {
      const sid = d.schoolId || Object.keys(schoolMap).find(k => schoolMap[k].name === d.school) || '';
      const school = schoolMap[sid];
      return school && school.tier === currentFilters.tier;
    });
  }

  if (currentFilters.search) {
    const q = currentFilters.search.toLowerCase();
    filtered = filtered.filter(d => {
      const catLabel = (CATEGORIES[d.category] || {}).label || '';
      return (d.school || '').toLowerCase().includes(q) ||
        (d.college || '').toLowerCase().includes(q) ||
        (d.major || '').toLowerCase().includes(q) ||
        (d.note || '').toLowerCase().includes(q) ||
        catLabel.toLowerCase().includes(q);
    });
  }

  return filtered;
}

function getPageData() {
  const filtered = getFilteredData();
  const start = (currentPage - 1) * PAGE_SIZE;
  return { items: filtered.slice(start, start + PAGE_SIZE), total: filtered.length };
}

function getTierBadge(tier) {
  if (tier === '985') return '<span class="badge badge-985">985</span>';
  if (tier === '211') return '<span class="badge badge-211">211</span>';
  if (tier === 'language') return '<span class="badge badge-lang">外语类</span>';
  return '';
}

function getSchoolTier(schoolName) {
  const school = SCHOOLS.find(s => s.name === schoolName);
  return school ? school.tier : '';
}

function getStatusBadge(status) {
  if (!status) return '';
  if (status.includes('报名中')) return `<span class="badge badge-active">${status}</span>`;
  if (status.includes('即将截止')) return `<span class="badge badge-urgent">${status}</span>`;
  if (status.includes('已截止')) return `<span class="badge badge-closed">${status}</span>`;
  if (status.includes('即将发布') || status.includes('待发布')) return `<span class="badge badge-upcoming">${status}</span>`;
  return status;
}

function getTypeBadge(type) {
  if (type === '夏令营') return '<span class="badge badge-summer">夏令营</span>';
  if (type === '预推免') return '<span class="badge badge-pre">预推免</span>';
  return type;
}

function getCategoryBadge(cat) {
  const c = CATEGORIES[cat];
  if (!c) return cat;
  return `<span style="display:inline-block;padding:2px 7px;border-radius:9px;font-size:.7rem;background:${c.color}15;color:${c.color};border:1px solid ${c.color}30;white-space:nowrap">${c.icon} ${c.label}</span>`;
}

function getConfidenceBadge(conf) {
  if (conf === 'confirmed') return '<span class="badge badge-verified">✓ 已确认</span>';
  return '<span class="badge badge-predicted">~ 预测</span>';
}

function formatUrl(url) {
  if (!url) return '--';
  let display = url.replace(/^https?:\/\//, '');
  if (display.length > 35) display = display.substring(0, 32) + '...';
  return `<a href="${url}" target="_blank" rel="noopener" title="${url}">${display}</a>`;
}

function renderTable() {
  const { items, total } = getPageData();
  const tbody = document.getElementById('tableBody');

  if (items.length === 0) {
    tbody.innerHTML = `<tr><td colspan="12" style="text-align:center;padding:48px;color:var(--text-muted);">暂无匹配数据 · 试试调整筛选条件或添加新信息</td></tr>`;
  } else {
    tbody.innerHTML = items.map(d => {
      const tier = getSchoolTier(d.school);
      const tierBadge = getTierBadge(tier);
      const catBadge = getCategoryBadge(d.category);
      const typeBadge = getTypeBadge(d.type);
      const statusBadge = getStatusBadge(d.status);
      const confBadge = getConfidenceBadge(d.confidence);

      const apCls = d.applied ? 'on-applied' : '';
      const ivCls = d.interviewed ? 'on-interview' : '';
      const ofCls = d.offered ? 'on-offer' : '';

      const apTtl = d.applied && d.appliedAt ? `已申请于 ${new Date(d.appliedAt).toLocaleDateString('zh-CN')}` : '标记已申请';
      const ivTtl = d.interviewed && d.interviewedAt ? `已入面于 ${new Date(d.interviewedAt).toLocaleDateString('zh-CN')}` : '标记已入面';
      const ofTtl = d.offered && d.offeredAt ? `已录取于 ${new Date(d.offeredAt).toLocaleDateString('zh-CN')}` : '标记已录取';

      const isDiscovered = autoDiscoveries.some(ad => ad.school === d.school);
      return `<tr class="${isDiscovered ? 'discovered' : ''}">
        <td><strong style="color:var(--text-bright);">${tierBadge}${d.school}${isDiscovered ? ' 🆕' : ''}</strong></td>
        <td>${d.college || '--'}</td>
        <td>${d.major || '--'}</td>
        <td>${catBadge}</td>
        <td>${typeBadge}</td>
        <td>${d.deadline || '--'}</td>
        <td>${d.eventDate || '--'}</td>
        <td>${statusBadge}</td>
        <td>${confBadge}</td>
        <td>
          <button class="track-btn ${apCls}" onclick="toggleTrack('${d.id}','applied')" title="${apTtl}">申</button>
          <button class="track-btn ${ivCls}" onclick="toggleTrack('${d.id}','interviewed')" title="${ivTtl}">面</button>
          <button class="track-btn ${ofCls}" onclick="toggleTrack('${d.id}','offered')" title="${ofTtl}">录</button>
        </td>
        <td>${formatUrl(d.url)}</td>
        <td style="font-size:.75rem;color:var(--text-muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${(d.note||'').replace(/"/g,'&quot;')}">${d.note || '--'}</td>
      </tr>`;
    }).join('');
  }

  updateStats();
  renderPagination(total);
  updateTabCounts();
}

function renderPagination(total) {
  const totalPages = Math.ceil(total / PAGE_SIZE) || 1;
  const pag = document.getElementById('pagination');
  if (totalPages <= 1) {
    pag.innerHTML = `<span class="page-info">共 ${total} 条</span>`;
    return;
  }
  let html = `<button ${currentPage===1?'disabled':''} onclick="goToPage(${currentPage-1})">◀ 上一页</button>`;
  html += `<span class="page-info">第 ${currentPage} / ${totalPages} 页 · 共 ${total} 条</span>`;
  html += `<button ${currentPage===totalPages?'disabled':''} onclick="goToPage(${currentPage+1})">下一页 ▶</button>`;
  html += ` <select onchange="changePageSize(this.value)" style="padding:4px 8px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:.78rem;font-family:inherit">`;
  [25, 50, 100].forEach(n => { html += `<option value="${n}" ${PAGE_SIZE===n?'selected':''}>每页${n}条</option>`; });
  html += `</select>`;
  pag.innerHTML = html;
}

function goToPage(p) { currentPage = p; renderTable(); document.getElementById('tableWrapper').scrollTop = 0; }
function changePageSize(n) { localStorage.setItem(SETTINGS_KEY, JSON.stringify({pageSize: parseInt(n)})); location.reload(); }

function updateStats() {

function toggleTrack(id, field) {
  const entry = data.find(d => d.id === id);
  if (!entry) return;
  entry[field] = !entry[field];
  if (entry[field]) {
    entry[field + 'At'] = new Date().toISOString();
  } else {
    entry[field + 'At'] = null;
  }
  saveData();

  // Update only the current page without full re-render for speed
  renderTable();
}

function getRecentTrackEvents() {
  const events = [];
  data.forEach(d => {
    if (d.appliedAt) events.push({ school: d.school, major: d.major, action: '已申请', time: d.appliedAt });
    if (d.interviewedAt) events.push({ school: d.school, major: d.major, action: '已入面', time: d.interviewedAt });
    if (d.offeredAt) events.push({ school: d.school, major: d.major, action: '已录取', time: d.offeredAt });
  });
  events.sort((a, b) => new Date(b.time) - new Date(a.time));
  if (events.length === 0) return '<span style="color:var(--text-muted)">暂无追踪记录，点击表格中的申/面/录按钮开始追踪</span>';
  return events.slice(0, 15).map(e => {
    const d = new Date(e.time);
    return `<div style="padding:3px 0;border-bottom:1px solid var(--border)">${d.toLocaleDateString('zh-CN')} ${d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})} · <strong>${e.school}</strong> ${e.major} - ${e.action}</div>`;
  }).join('');
}

function generateDailyReport() {
  const now = new Date();
  const dateStr = now.toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
  const timeStr = now.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
  document.getElementById('updateDate').textContent = dateStr;
  document.getElementById('lastRefreshTime').textContent = `${dateStr} ${timeStr}`;
  localStorage.setItem('baoyan_last_refresh', JSON.stringify({ date: dateStr, time: timeStr }));

  const activeList = data.filter(d => (d.status||'').includes('报名中'));
  const urgentList = data.filter(d => (d.status||'').includes('即将截止'));
  const upcomingList = data.filter(d => (d.status||'').includes('即将发布'));

  function renderItems(list) {
    if (list.length === 0) return '<div style="color:var(--text-muted);padding:4px 0">暂无</div>';
    return list.map(d => {
      const catLabel = (CATEGORIES[d.category]||{}).label || d.category;
      const days = computeDaysRemaining(d.deadline);
      return `<div class="report-item">
        <div class="ri-left">[${getTypeBadge(d.type).replace(/<[^>]*>/g,'')}] <strong>${d.school}</strong> · ${d.major} (${catLabel})</div>
        <div class="ri-right">${d.deadline || '--'} ${days ? '('+days+')' : ''}</div>
      </div>`;
    }).join('');
  }

  document.getElementById('tableWrapper').style.display = 'none';
  document.getElementById('pagination').style.display = 'none';
  document.getElementById('reportView').style.display = 'block';
  document.getElementById('reportView').innerHTML = `
    <h2>📋 ${dateStr} 保研日报</h2>
    <p class="report-date">📅 数据刷新于 ${timeStr}</p>
    <div class="report-summary">
      <div class="stat-card active"><div class="num">${activeList.length}</div><div class="lbl">报名进行中</div></div>
      <div class="stat-card urgent"><div class="num">${urgentList.length}</div><div class="lbl">即将截止</div></div>
      <div class="stat-card"><div class="num">${upcomingList.length}</div><div class="lbl">即将发布</div></div>
      <div class="stat-card track"><div class="num">${data.filter(d=>d.applied).length}</div><div class="lbl">已申请</div></div>
      <div class="stat-card offer"><div class="num">${data.filter(d=>d.offered).length}</div><div class="lbl">已录取</div></div>
    </div>
    <div class="report-section"><h4>🟢 报名进行中 (${activeList.length})</h4>${renderItems(activeList)}</div>
    <div class="report-section"><h4>🔴 即将截止 (${urgentList.length})</h4>${renderItems(urgentList)}</div>
    <div class="report-section"><h4>🟡 即将发布 (${upcomingList.length})</h4>${renderItems(upcomingList)}</div>
    <div class="report-section"><h4>📊 追踪概览</h4>
      <div style="padding:8px">已申请 <strong>${data.filter(d=>d.applied).length}</strong> 所 → 已入面 <strong>${data.filter(d=>d.interviewed).length}</strong> 所 → 已录取 <strong>${data.filter(d=>d.offered).length}</strong> 所</div>
    </div>
    <div style="text-align:center;margin-top:20px">
      <button class="btn btn-outline" onclick="document.getElementById('reportView').style.display='none';document.getElementById('tableWrapper').style.display='';document.getElementById('pagination').style.display='';renderTable()">返回表格视图</button>
      <button class="btn btn-primary btn-sm" onclick="window.print()">🖨️ 打印报告</button>
    </div>
  `;

  // Flash button
  const btn = document.querySelector('.btn-primary');
  if (btn) { btn.style.transform = 'scale(1.05)'; setTimeout(() => { btn.style.transform = ''; }, 200); }
  showToast('✅ 今日汇总已生成 · ' + timeStr);
}

function computeDaysRemaining(deadline) {
  if (!deadline) return null;
  const match = deadline.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
  if (!match) return null;
  const target = new Date(parseInt(match[1]), parseInt(match[2])-1, parseInt(match[3]));
  const now = new Date();
  const diff = Math.ceil((target - now) / (1000*60*60*24));
  if (diff < 0) return '已过期';
  if (diff === 0) return '今天截止';
  return `剩${diff}天`;
}

function exportCSV() {
  const filtered = getFilteredData();
  const header = ['学校','学院','专业方向','类别','类型','报名截止','活动时间','招生人数','状态','网址','可信度','已申请','已入面','已录取','备注'];
  const rows = filtered.map(d => [
    d.school, d.college, d.major, (CATEGORIES[d.category]||{}).label||d.category, d.type,
    d.deadline, d.eventDate, d.quota, d.status, d.url, d.confidence,
    d.applied?'是':'否', d.interviewed?'是':'否', d.offered?'是':'否', d.note||''
  ]);
  const BOM = '﻿';
  const csv = BOM + [header, ...rows].map(r => r.map(c => '"'+(c||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `保研信息_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `保研数据备份_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) { alert('文件格式错误'); return; }
      if (confirm(`即将导入 ${imported.length} 条数据。\n选择"确定"将覆盖现有数据，选择"取消"将合并。`)) {
        data = imported;
      } else {
        const existingIds = new Set(data.map(d => d.id));
        imported.forEach(d => { if (!existingIds.has(d.id)) data.push(d); });
      }
      saveData(); renderTable();
      alert('导入完成！');
    } catch(err) { alert('导入失败：' + err.message); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function resetData() {
  if (confirm('确定要恢复默认数据吗？这将删除所有自定义添加的信息和追踪记录。此操作不可撤销。')) {

// ==================== INIT ====================
let autoDiscoveries = [];

async function loadAutoFindings() {
  try {
    const resp = await fetch('data/daily-findings.json');
    if (!resp.ok) return;
    const findings = await resp.json();
    if (!findings.checkedAt) return;

    autoDiscoveries = findings.discoveries || [];
    document.getElementById('autoCheckBar').style.display = 'block';
    document.getElementById('autoCheckTime').textContent = new Date(findings.checkedAt).toLocaleString('zh-CN');
    document.getElementById('autoCheckTotal').textContent = findings.totalSchools || '--';
    document.getElementById('autoCheckTotalItems').textContent = findings.totalAnnouncements || 0;
    document.getElementById('autoCheckFound').textContent = findings.newAnnouncements || 0;

    // Render detailed list
    const detail = document.getElementById('autoCheckDetail');
    const withItems = autoDiscoveries.filter(d => d.items && d.items.length > 0);
    if (withItems.length === 0) {
      detail.innerHTML = '<div style="color:var(--text-muted);padding:8px">暂无新公告发现</div>';
    } else {
      const tierBadge = t => t === '985' ? '<span class="badge badge-985">985</span>' : t === '211' ? '<span class="badge badge-211">211</span>' : '<span class="badge badge-lang">外语类</span>';
      detail.innerHTML = withItems.map(d => {
        const items = (d.items || []).sort((a,b) => (b.isNew ? 1 : 0) - (a.isNew ? 1 : 0));
        return `<div style="margin-bottom:6px;padding:8px 10px;background:rgba(19,24,32,.5);border-radius:6px">
          <div style="font-weight:600;color:var(--text-bright);margin-bottom:4px">${tierBadge(d.tier)} ${d.school} <span style="font-size:.7rem;color:var(--text-muted)">(${d.totalAnnouncements}条)</span></div>
          ${items.slice(0, 5).map(i => `<div style="font-size:.78rem;padding:3px 0;border-bottom:1px solid rgba(30,42,58,.4)">
            ${i.isNew ? '<span style="color:var(--accent);font-weight:600">🆕</span> ' : ''}
            <a href="${i.url}" target="_blank" style="color:var(--primary)">${i.title}</a>
            ${i.date ? ` <span style="color:var(--text-muted);font-size:.7rem">${i.date}</span>` : ''}
          </div>`).join('')}
          ${items.length > 5 ? `<div style="font-size:.7rem;color:var(--text-muted);padding-top:2px">...还有 ${items.length-5} 条</div>` : ''}
        </div>`;
      }).join('');
    }
  } catch(e) { /* 本地打开时fetch失败，静默忽略 */ }
}

function init() {
  loadData();

  populateSelects();
  renderTable();
  loadAutoFindings().then(() => renderTable());

  const now = new Date();
  document.getElementById('updateDate').textContent = now.toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
  document.getElementById('lastRefreshTime').textContent = now.toLocaleString('zh-CN', { hour:'2-digit', minute:'2-digit' });

  const last = localStorage.getItem('baoyan_last_refresh');
  if (last) {
    try { const lr = JSON.parse(last); document.getElementById('lastRefreshTime').textContent = `${lr.date} ${lr.time}`; } catch(e) {}
  }

  document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
  document.getElementById('trackModal').addEventListener('click', function(e) { if (e.target === this) this.classList.remove('show'); });

  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.key === 'r') { e.preventDefault(); generateDailyReport(); }
    if (e.ctrlKey && e.key === 'f') { e.preventDefault(); document.getElementById('searchInput').focus(); }
    if (e.key === 'Escape') { closeModal(); document.getElementById('trackModal').classList.remove('show'); }
  });
}

init();
</script>
</body>
</html>
